version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: vti-mysql-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=vti_db
      - MYSQL_USER=springuser
      - MYSQL_PASSWORD=123456
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: